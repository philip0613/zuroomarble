<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지옥의 주루마블</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🎲 지옥의 주루마블</h1>
        <div class="auth-section">
            <!-- 로그인 전 -->
            <button id="openLoginBtn">로그인 / 회원가입 🔐</button>
            <!-- 로그인 후 -->
            <span id="userInfo" class="hidden"></span>
            <button id="logoutBtn" class="hidden" style="background-color: #555;">로그아웃</button>
            
            <button id="editModeBtn">판 커스텀하기 ✏️</button>
            <button id="saveBtn">내 판 저장하기 💾</button>
            <button id="loadBtn">내 판 불러오기 📂</button>
        </div>
    </div>

    <!-- 로그인 모달 (팝업창) -->
    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2>계정 연동</h2>
            <input type="email" id="emailInput" placeholder="이메일 (예: test@test.com)">
            <input type="password" id="passwordInput" placeholder="비밀번호 (6자리 이상)">
            <button id="loginSubmitBtn">로그인</button>
            <button id="signupSubmitBtn" style="background-color: #3498db;">새로 회원가입</button>
        </div>
    </div>

    <div id="setupArea">
        <h2>👥 플레이어 설정</h2>
        <input type="text" id="playerName" placeholder="이름 (예: 민기)">
        <button id="addPlayerBtn">추가하기</button>
        <div id="playerList"></div>
        <button id="startGameBtn" class="hidden">게임 시작! 🚀</button>
    </div>

    <div id="gameArea" class="hidden">
        <div id="boardContainer">
            <div id="centerArea">
                <h2 id="turnIndicator">누구 차례?</h2>
                <div class="dice-controls">
                    <button id="diceBtn">주사위 굴리기 🎲</button>
                    <button id="hellDiceBtn" class="hidden">🔥 지옥 탈출 굴리기 🔥</button>
                </div>
                <div id="hellMiniBoard"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
