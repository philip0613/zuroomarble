<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지옥의 주루마블</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🎲 지옥의 주루마블</h1>
        <!-- 새롭게 추가된 커스텀 및 DB 연동 버튼들 -->
        <div class="auth-section">
            <button id="editModeBtn">판 커스텀하기 ✏️</button>
            <button id="saveBtn">현재 판 저장하기 💾</button>
            <button id="loadBtn">저장된 판 불러오기 📂</button>
        </div>
    </div>

    <!-- 1. 플레이어 등록 화면 -->
    <div id="setupArea">
        <h2>👥 플레이어 설정</h2>
        <input type="text" id="playerName" placeholder="이름 (예: 민기)">
        <button id="addPlayerBtn">추가하기</button>
        <div id="playerList"></div>
        <button id="startGameBtn" class="hidden">게임 시작! 🚀</button>
    </div>

    <!-- 2. 메인 게임 화면 -->
    <div id="gameArea" class="hidden">
        <div id="boardContainer">
            <!-- 중앙 보드 -->
            <div id="centerArea">
                <h2 id="turnIndicator">누구 차례?</h2>
                <div class="dice-controls">
                    <button id="diceBtn">주사위 굴리기 🎲</button>
                    <button id="hellDiceBtn" class="hidden">🔥 지옥 탈출 굴리기 🔥</button>
                </div>
                <!-- 3x3 미니 지옥 보드판 -->
                <div id="hellMiniBoard"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
