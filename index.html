<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지옥의 주루마블</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🎲 지옥의 주루마블</h1>
        <div class="auth-section">
            <button id="loginBtn">로그인 (준비중)</button>
            <button id="saveBtn">내 판 저장하기 (준비중)</button>
        </div>
    </div>

    <!-- 6x6 그리드 주루마블 판 -->
    <div id="boardContainer">
        <!-- 가운데 빈 공간 (주사위 & 지옥 룰렛) -->
        <div id="centerArea">
            <div id="normalMode">
                <p id="statusMsg">주사위를 굴려주세요!</p>
                <button id="diceBtn">주사위 굴리기 🎲</button>
            </div>
            
            <div id="hellMode" class="hidden">
                <h2>🔥 지옥 룰렛 🔥</h2>
                <p>7칸 중 단 1칸만 탈출!</p>
                <h1 id="hellResult">🎯</h1>
                <button id="hellDiceBtn">룰렛 돌리기</button>
            </div>
        </div>
        <!-- 자바스크립트로 20개의 겉면 칸들이 여기에 생성됨 -->
    </div>

    <script src="script.js"></script>
</body>
</html>
